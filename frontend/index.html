<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>ArtCollab</title>
  <style>
    /* Minimal reset - Tailwind handles the rest */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    /* Preloader shell - full screen overlay */
    #preload-shell {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      /* slate-950 */
      color: white;
      z-index: 9999;
    }

    /* Spinner animation */
    .loader-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #334155;
      /* slate-700 */
      border-top-color: #a855f7;
      /* purple-500 */
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Accessibility: reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .loader-spinner {
        animation: none;
        border-top-color: #a855f7;
      }
    }
  </style>
</head>

<body>
  <!-- Preloader: fades out when page loads -->
  <div id="preload-shell">
    <div class="loader-spinner" role="status" aria-label="Loading"></div>
  </div>

  <!-- React mounts here -->
  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>

  <!-- Remove preloader after load -->
  <script>
    window.addEventListener("load", () => {
      const loader = document.getElementById("preload-shell");
      if (loader) {
        loader.style.opacity = "0";
        loader.style.transition = "opacity 0.3s ease";
        setTimeout(() => loader.remove(), 300);
      }
    });
  </script>
</body>

</html>
